<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>week 11</title>
</head>
<body>
    <h1>Week 11: Introduction to Form</h1>
    <form action="#" method="get">
        <div>
            <label for="fname">First Name</label>
            <input type="text" id="fname" name="fname" title="First name">
        </div>
        <div>
            <label for="">Last Name</label>
            <input type="text" id="lanme" name="lname" placeholder="Last Name">
        </div>

            <label for="">Password</label>

        <div>
            <label for="">upload your Assignments</label>
            <input type="file">
        </div>
        <div>
            <label for="">What is your hooby</label>

                <input type="checkbox" id="interest1" name="interest1" value="Sports" checked>

                <label for="interest2">Musci</label>

        </div>

            <label for="">Which OS would you perfer</label>

            <label for="os2">os2</label>

        <div>

            </select>

        </div>
        <div>
